[package]
name = "muse_contracts"
version = "1.0.0"
edition = "2021"
description = "Muse AI Art Marketplace Smart Contracts on Stellar"
authors = ["Muse Team <team@muse.art>"]
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
stellar-contract-sdk = "0.8.0"
stellar-contract-macros = "0.8.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
stellar-contract-sdk = { version = "0.8.0", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = true
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 0
overflow-checks = true
